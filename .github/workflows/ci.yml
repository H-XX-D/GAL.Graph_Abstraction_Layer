name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Check release version
        run: python scripts/release_check.py --version-only

      - name: Run tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build

      - name: Check release artifacts
        run: python scripts/release_check.py --artifacts-only

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gal-release-artifacts
          path: |
            dist/gal_netlist-*.tar.gz
            dist/gal_netlist-*.whl
            dist/SHA256SUMS
            dist/release-notes-v*.md
          if-no-files-found: error
          retention-days: 14

      - name: Smoke installed wheel
        run: |
          tmpdir="$(mktemp -d)"
          python -m venv "$tmpdir/venv"
          "$tmpdir/venv/bin/python" -m pip install dist/*.whl
          cat > "$tmpdir/minimal.mal.gal" <<'EOF'
          @gal netlist.v0
          @dialect mal.v0
          claim_1 "Claim" [kind: claim]
          EOF
          cd "$tmpdir"
          "$tmpdir/venv/bin/gal" dialects --json | "$tmpdir/venv/bin/python" -c 'import json, sys; assert "mal.v0" in json.load(sys.stdin)["dialects"]'
          "$tmpdir/venv/bin/gal" examples --json | "$tmpdir/venv/bin/python" -c 'import json, sys; assert "minimal.mal.gal" in [item["name"] for item in json.load(sys.stdin)["examples"]]'
          "$tmpdir/venv/bin/gal" examples --dialect hal.v0 --json | "$tmpdir/venv/bin/python" -c 'import json, sys; data=json.load(sys.stdin); assert data["examples"] == [{"dialect": "hal.v0", "name": "dialects/hal.gal"}]'
          "$tmpdir/venv/bin/gal" examples --name minimal.mal.gal > copied.mal.gal
          "$tmpdir/venv/bin/gal" init starter.gal --dialect mal.v0 --json
          "$tmpdir/venv/bin/gal" verify starter.gal --json
          "$tmpdir/venv/bin/gal" verify copied.mal.gal --json
          "$tmpdir/venv/bin/gal" verify minimal.mal.gal --json

      - name: Verify examples
        run: gal verify-all examples --json

      - name: Smoke CLI outputs
        run: |
          gal --version
          gal doctor --json >/dev/null
          tmpdir="$(mktemp -d)"
          gal init "$tmpdir/starter.gal" --dialect hal.v0 --json >/dev/null
          gal verify "$tmpdir/starter.gal" --json >/dev/null
          gal examples --json >/dev/null
          gal examples --dialect hal.v0 --json >/dev/null
          gal examples --name minimal.mal.gal >/dev/null
          gal dialects --json >/dev/null
          gal components --json >/dev/null
          gal schemas --json >/dev/null
          gal schemas gal.verify_report.v0 >/dev/null
          test -f docs/schemas/gal.verify_report.v0.schema.json
          gal convert examples/minimal.mal.gal --to json >/dev/null
          gal convert examples/minimal.mal.gal --to dot >/dev/null
          gal convert examples/minimal.mal.gal --to yaml >/dev/null
          gal convert examples/minimal.mal.gal --to cypher >/dev/null
          gal load examples/minimal.mal.gal --mode plan >/dev/null
